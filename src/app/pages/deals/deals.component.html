<div id="container">
  <div class="header">
    <h1>Deals</h1>
    <button mat-raised-button color="primary" (click)="addDeal()">
      <mat-icon aria-label="Add deal" fontIcon="add"></mat-icon>Add
    </button>
  </div>

  <div id="filter">
    <form [formGroup]="filterForm">
      <mat-form-field subscriptSizing="dynamic">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>
      <mat-form-field subscriptSizing="dynamic">
        <mat-label>Purchase Price</mat-label>
        <input matInput currencyMask formControlName="purchasePrice" />
      </mat-form-field>
      <mat-form-field subscriptSizing="dynamic">
        <mat-label>Condition</mat-label>
        <mat-select formControlName="operator">
          <mat-option value="gt">Greater than</mat-option>
          <mat-option value="lt">Less than</mat-option>
        </mat-select>
      </mat-form-field>
      <button mat-raised-button color="accent" type="button" (click)="clear()">
        Clear
      </button>
    </form>
  </div>

  @if (!loading()) {
    <table mat-table [dataSource]="deals()">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let deal">{{ deal.name }}</td>
      </ng-container>

      <ng-container matColumnDef="address">
        <th mat-header-cell *matHeaderCellDef>Address</th>
        <td mat-cell *matCellDef="let deal">{{ deal.address }}</td>
      </ng-container>

      <ng-container matColumnDef="purchasePrice">
        <th mat-header-cell *matHeaderCellDef>Purchase Price</th>
        <td mat-cell *matCellDef="let deal">
          {{ deal.purchasePrice | currency }}
        </td>
      </ng-container>

      <ng-container matColumnDef="noi">
        <th mat-header-cell *matHeaderCellDef>NOI</th>
        <td mat-cell *matCellDef="let deal">{{ deal.noi | currency }}</td>
      </ng-container>

      <ng-container matColumnDef="capRate">
        <th mat-header-cell *matHeaderCellDef>Cap Rate</th>
        <td mat-cell *matCellDef="let deal">
          {{ deal.capRate | number: "1.2-2" }}%
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  } @else {
    <mat-spinner [diameter]="64"></mat-spinner>
  }

  <mat-paginator
    [pageIndex]="paginationData().pageIndex"
    [pageSize]="paginationData().pageSize"
    [length]="total()"
    [pageSizeOptions]="[10, 25, 50]"
    (page)="onPageChange($event)"
  ></mat-paginator>
</div>
